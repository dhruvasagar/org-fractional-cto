name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Emacs ${{ matrix.emacs_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version: ['29.4', '30.1']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Emacs ${{ matrix.emacs_version }}
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Show versions
        run: |
          emacs --version
          emacs -Q --batch --eval '(princ (format "Org %s\n" (org-version)))'

      - name: Run ERT test suite
        run: make test

      - name: Byte-compile (warnings are errors)
        run: |
          emacs -Q --batch -L . \
            --eval '(setq byte-compile-error-on-warn t)' \
            -f batch-byte-compile org-fractional-cto*.el
